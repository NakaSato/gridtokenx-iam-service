syntax = "proto3";

package identity;

service IdentityService {
  // Verifies a JWT token and returns claims
  rpc VerifyToken (TokenRequest) returns (ClaimsResponse);
  
  // Authorizes a request based on role/permissions
  rpc Authorize (AuthorizeRequest) returns (AuthorizeResponse);

  // Gets user information from token
  rpc GetUserInfo (TokenRequest) returns (UserInfoResponse);

  // Verifies an API key and returns status/role
  rpc VerifyApiKey (ApiKeyRequest) returns (ApiKeyResponse);

  // Registers a new user
  rpc RegisterUser (RegisterUserRequest) returns (RegisterUserResponse);

  // Links a wallet to a user
  rpc LinkWallet (LinkWalletRequest) returns (LinkWalletResponse);

  // Initializes a user's wallet on-chain
  rpc InitializeUserWallet (InitializeWalletRequest) returns (InitializeWalletResponse);
}

message RegisterUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string first_name = 4;
  string last_name = 5;
}

message RegisterUserResponse {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string message = 4;
}

message LinkWalletRequest {
  string user_id = 1;
  string wallet_address = 2;
  string label = 3;
  bool is_primary = 4;
}

message LinkWalletResponse {
  string wallet_id = 1;
  string user_id = 2;
  string wallet_address = 3;
  string message = 4;
}

message TokenRequest {
  string token = 1;
}

message ClaimsResponse {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
  string role = 4;
  string error_message = 5;
}

message AuthorizeRequest {
  string token = 1;
  string required_permission = 2;
}

message AuthorizeResponse {
  bool authorized = 1;
  string error_message = 2;
}

message UserInfoResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string first_name = 5;
  string last_name = 6;
  string wallet_address = 7;
}

message ApiKeyRequest {
  string key = 1;
}

message ApiKeyResponse {
  bool valid = 1;
  string role = 2;
  string error_message = 3;
}

message InitializeWalletRequest {
  string user_id = 1;
  string wallet_address = 2;
  double initial_funding_sol = 3;
}

message InitializeWalletResponse {
  bool success = 1;
  string message = 2;
  string transaction_signature = 3;
}
