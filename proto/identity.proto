syntax = "proto3";

package identity;

service IdentityService {
  // Verifies a JWT token and returns claims
  rpc VerifyToken (TokenRequest) returns (ClaimsResponse);
  
  // Authorizes a request based on role/permissions
  rpc Authorize (AuthorizeRequest) returns (AuthorizeResponse);

  // Gets user information from token
  rpc GetUserInfo (TokenRequest) returns (UserInfoResponse);

  // Verifies an API key and returns status/role
  rpc VerifyApiKey (ApiKeyRequest) returns (ApiKeyResponse);
}

message TokenRequest {
  string token = 1;
}

message ClaimsResponse {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
  string role = 4;
  string error_message = 5;
}

message AuthorizeRequest {
  string token = 1;
  string required_permission = 2;
}

message AuthorizeResponse {
  bool authorized = 1;
  string error_message = 2;
}

message UserInfoResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string first_name = 5;
  string last_name = 6;
  string wallet_address = 7;
}

message ApiKeyRequest {
  string key = 1;
}

message ApiKeyResponse {
  bool valid = 1;
  string role = 2;
  string error_message = 3;
}
